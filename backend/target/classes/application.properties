# EduBot — Configuración base
spring.application.name=edubot

# ── Base de datos ──
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/edubot}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ──
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── Puerto ──
server.port=${PORT:8080}

# ── CORS ──
edubot.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173}

# ── IA Anthropic ──
anthropic.api.key=${ANTHROPIC_API_KEY:}
anthropic.api.url=https://api.anthropic.com/v1/messages
anthropic.api.model=claude-3-haiku-20240307

# ── Actas PDF (HU007) ──
edubot.actas.directorio=${ACTAS_DIR:actas}
edubot.actas.url-base=${ACTAS_URL_BASE:http://localhost:8080/actas}
# Cambia el secret en producción con una cadena de 32+ caracteres
edubot.jwt.secret=${JWT_SECRET:EduBotSecretKeyMuyLargaParaQueSeaSegura2024!}
# Duración del token: 24 horas en milisegundos
edubot.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
