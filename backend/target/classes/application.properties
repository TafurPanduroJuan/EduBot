# EduBot — Configuración base
spring.application.name=edubot

# ── Base de datos (sobreescrita por application-prod.properties en Render) ──
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/edubot}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ──
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:validate}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── Puerto ──
server.port=${PORT:8080}

# ── CORS ──
# Lista de orígenes separados por coma — añade tu URL de Vercel aquí:
edubot.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173}
